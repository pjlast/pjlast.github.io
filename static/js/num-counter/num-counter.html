<style>
  .counter {
    display: flex;
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    margin: 1rem 0;
  }

  .counter button {
    width: 2em;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 0;
    background-color: transparent;
    touch-action: manipulation;
    color: var(--text-color);
    font-size: 2rem;
  }

  .counter button:hover {
    background-color: var(--secondary-color);
  }

  svg {
    width: 25%;
    height: 25%;
  }

  path {
    vector-effect: non-scaling-stroke;
    stroke-width: 2px;
    stroke: var(--text-color);
  }

  .counter-viewport {
    width: 8em;
    height: 4em;
    overflow: hidden;
    text-align: center;
    position: relative;
  }

  .counter-viewport strong {
    position: absolute;
    display: flex;
    width: 100%;
    height: 100%;
    font-weight: 400;
    color: var(--accent-color);
    font-size: 4rem;
    align-items: center;
    justify-content: center;
  }

  #counter-digit {
    position: absolute;
    width: 100%;
    height: 100%;
    top: -100px;
    animation-duration: 0.3s;
  }

  #counter-digit-current {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0px;
    animation-duration: 0.3s;
  }

  .hidden {
    top: -100%;
    user-select: none;
  }

  .animUp1 {
    animation-name: animUp1;
    animation-duration: 0.3s;
  }

  .animUp2 {
    animation-name: animUp2;
    animation-duration: 0.3s;
  }

  .animDown1 {
    animation-name: animDown1;
    animation-duration: 0.3s;
  }

  .animDown2 {
    animation-name: animDown2;
    animation-duration: 0.3s;
  }

  @keyframes animDown1 {
    0% {
      top: -100px;
    }
    100% {
      top: 0px;
    }
  }

  @keyframes animDown2 {
    0% {
      top: 0;
    }
    100% {
      top: 100px;
    }
  }

  @keyframes animUp1 {
    0% {
      top: 100px;
    }
    100% {
      top: 0px;
    }
  }

  @keyframes animUp2 {
    0% {
      top: 0px;
    }
    100% {
      top: -100px;
    }
  }
</style>

<div class="counter">
  <button id="decrease-counter" aria-label="Decrease the counter by one">
    <svg aria-hidden="true" viewBox="0 0 1 1">
      <path d="M0,0.5 L1,0.5" />
    </svg>
  </button>

  <div class="counter-viewport">
    <div class="counter-digits">
      <strong id="counter-digit">0</strong>
    </div>

    <div class="counter-digits">
      <strong id="counter-digit-current">0</strong>
    </div>
  </div>

  <button id="increase-counter" aria-label="Increase the counter by one">
    <svg aria-hidden="true" viewBox="0 0 1 1">
      <path d="M0,0.5 L1,0.5 M0.5,0 L0.5,1" />
    </svg>
  </button>
</div>
